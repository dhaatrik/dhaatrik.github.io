name: CI/CD Pipeline

on:
    # Trigger tests on push to main AND any pull request targeting main
    push:
        branches: [main]
    pull_request:
        branches: [main]
    # Allows manual runs from the Actions tab
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: 'pages'
    cancel-in-progress: true

jobs:
    test:
        name: Run Engineering Verification
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: 'npm'

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests
              run: npm test

            - name: Install Playwright Browsers
              run: npx playwright install --with-deps chromium

            - name: Run E2E verification
              run: npm run test:e2e

    build:
        name: Build Static Artifacts
        needs: test
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Compile and upload production build
              uses: withastro/action@v3
              with:
                  node-version: 22
                  package-manager: npm
              env:
                  PUBLIC_GIT_SHA: ${{ github.sha }}

    deploy:
        name: Launch to Production
        needs: build
        # ⚡ Bolt: Strict assurance that deployment only occurs from main
        if: github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch'
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
