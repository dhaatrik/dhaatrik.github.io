<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
  <style>
    .light-logo { display: none; }
    .dark-logo { display: block; }
    @media (prefers-color-scheme: dark) {
      .light-logo { display: block; }
      .dark-logo { display: none; }
    }
  </style>
  <!-- Dark logo for light mode (dark icon on light bg) -->
  <g class="dark-logo">
    <circle cx="24" cy="24" r="20" fill="#0b0e14"/>
    <text x="24" y="30" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="22" fill="white">D</text>
  </g>
  <!-- Light logo for dark mode (light icon on dark bg) -->
  <g class="light-logo">
    <circle cx="24" cy="24" r="20" fill="white"/>
    <text x="24" y="30" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="22" fill="#0b0e14">D</text>
  </g>
</svg>
